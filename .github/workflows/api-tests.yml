name: API Tests

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - ".github/workflows/api-tests.yml"
      - "apps/api/**"
      - "packages/shared/**"

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/api-tests.yml"
      - "apps/api/**"
      - "packages/shared/**"

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: apps/api
        run: bun install

      - name: Run smoke tests
        working-directory: apps/api
        run: bun run test:smoke

      - name: Run bookings tests
        working-directory: apps/api
        run: bun run test:bookings

      - name: Run extract tests
        working-directory: apps/api
        run: bun run test:extract
